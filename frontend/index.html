<!DOCTYPE html>
<html>
<head>
  <title>TeamMatch</title>
</head>
<body>

<h2>Generate Teams</h2>

<textarea id="input" rows="10" cols="50">
{
  "course_id": "CS350",
  "team_size": 2,
  "students": [
    {"id": 1, "name": "Alice", "skills": {"python": 3}},
    {"id": 2, "name": "Bob", "skills": {"python": 1}},
    {"id": 3, "name": "Charlie", "skills": {"python": 2}},
    {"id": 4, "name": "Diana", "skills": {"python": 3}}
  ]
}
</textarea>

<br><br>

<button onclick="generate()">Generate Teams</button>

<pre id="output"></pre>

<script>
async function generate() {
  const data = JSON.parse(document.getElementById("input").value);

  const res = await fetch("http://127.0.0.1:8000/api/generate-teams", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  document.getElementById("output").textContent = JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
